# Prism Relay Secrets
#
# Registration token is auto-generated on first boot if not set here.
# The relay writes it to /data/.registration-token and logs it.
#
# To use your own token instead:
#   1. Generate: openssl rand -hex 32
#   2. Base64-encode: echo -n 'your-token' | base64
#   3. Set REGISTRATION_TOKEN below
apiVersion: v1
kind: Secret
metadata:
  name: prism-relay-secrets
type: Opaque
data:
  # Registration token — leave empty to auto-generate on first boot.
  # The auto-generated token is logged and persisted to /data/.registration-token.
  # To set explicitly: echo -n "$(openssl rand -hex 32)" | base64
  # REGISTRATION_TOKEN: ""

  # Metrics endpoint bearer token. Empty => /metrics is served only to loopback
  # peers (fails closed, never world-readable). Set a token to scrape /metrics
  # from another pod/host: echo -n "$(openssl rand -hex 32)" | base64
  METRICS_TOKEN: ""
