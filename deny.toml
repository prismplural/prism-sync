[advisories]
# cargo-deny 0.19+ removed the vulnerability lint key; all vulnerability
# advisories are errors unless explicitly listed in ignore.
ignore = []
unmaintained = "workspace"
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
]
exceptions = [
    { allow = ["CC0-1.0"], crate = "bip39" },
    { allow = ["CC0-1.0"], crate = "bitcoin_hashes" },
    { allow = ["CC0-1.0"], crate = "hex-conservative" },
    { allow = ["Zlib"], crate = "foldhash" },
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
deny = [
    { name = "serde_cbor", reason = "unmaintained; use ciborium for CBOR payloads" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
