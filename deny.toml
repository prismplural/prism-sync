[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { name = "serde_cbor", reason = "unmaintained; use ciborium for CBOR payloads" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
